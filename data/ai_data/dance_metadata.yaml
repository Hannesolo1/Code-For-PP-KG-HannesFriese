dataset:
  name: dance_styles
  primary_key: dance_style
  row_semantics: "One row per dance style. dance_type + dance_style must match an allowed pair."
  output_format:
    type: jsonl
    description: "One JSON object per line."

columns:
  dance_type:
    sdtype: categorical
    required: true
    description: "High-level category (e.g., American, Belly dance, Swing dance)."
  dance_style:
    sdtype: categorical
    required: true
    unique: true
    description: "Specific dance style name. Must be unique."
  origin:
    sdtype: categorical
    required: true
    description: "Geographic/cultural origin (country/region/culture). Keep concise (1–3 words) when possible."
  time_period:
    sdtype: categorical
    required: true
    description: "Historical period of emergence/popularity (e.g., '1920s', '19th century', 'Ancient', '1970s–1980s')."
  cultural_significance:
    sdtype: text
    required: true
    description: "1–3 sentences. Avoid invented citations. General cultural context is fine."
  notable_characteristics:
    sdtype: text
    required: true
    description: "Bullet-like phrasing allowed but keep as a single string. 1–3 sentences."
  instruments:
    sdtype: list
    required: true
    constraints:
      max_items: 10
    description: "List of 1-10 typical instruments/sounds used in this dance style (e.g., 'Piano', 'Drums', 'Violin', 'Electronic synthesizer', 'Voice/vocals', 'No instruments - a cappella'). Be specific and realistic."
  hardness_ratio:
    sdtype: numerical
    required: true
    constraints:
      min: 0.0
      max: 1.0
    description: "0.0 = easy/low intensity, 1.0 = very hard/high intensity. Use plausible values."
  dance_formation:
    sdtype: categorical
    required: true
    constraints:
      enum:
        - Solo
        - Partner
        - Group
        - Circle
        - Line
        - Square
        - Freestyle
        - Processional
        - Mixed
    description: "Primary common formation."
  costume:
    sdtype: text
    required: true
    description: "Typical attire/costume. 1–2 sentences."
  tempo_bpm:
    sdtype: object
    required: true
    properties:
      min:
        type: integer
        minimum: 40
        maximum: 220
      max:
        type: integer
        minimum: 40
        maximum: 220
    description: "Typical tempo range as object with 'min' and 'max' BPM values. Example: {'min': 110, 'max': 140}"
  famous_practitioners:
    sdtype: list
    required: true
    constraints:
      max_items: 5
    description: "List of up to 5 names or groups. If unsure, use well-known generic descriptors rather than hallucinating obscure people."
  events_and_festivals:
    sdtype: list
    required: true
    constraints:
      max_items: 5
    description: "List of notable events/festivals/contexts where it appears. If none are well-known, use broader contexts (e.g., 'Carnival celebrations')."
  modern_adaptations:
    sdtype: text
    required: true
    description: "1–2 sentences on modern variations/where it appears today."
  associated_music_genre:
    sdtype: list
    required: true
    constraints:
      max_items: 5
    description: "List of 1-5 music genre labels (e.g., Jazz, Pop, EDM, Traditional folk, Rock). Include multiple if the dance is performed to various genres."
  learning_difficulty:
    sdtype: categorical
    required: true
    constraints:
      enum: [Beginner, Intermediate, Advanced]
  health_benefits:
    sdtype: list
    required: true
    constraints:
      max_items: 5
    description: "List of benefits (e.g., 'Cardio fitness', 'Coordination')."
  age_group:
    sdtype: categorical
    required: true
    constraints:
      enum: [Kids, Teens, Adults, Seniors, All ages]
    description: "Most common audience/participant age group."

rules:
  - name: type_style_pair_must_match
    description: "dance_type and dance_style must be one of the allowed pairs in allowed_pairs.csv."
  - name: bpm_int
    description: "tempo_bpm must be an integer."
  - name: practitioners_list_strings
    description: "famous_practitioners must be a list of strings (no nulls)."
  - name: avoid_overclaiming
    description: "If you are not confident about a specific festival or person, use broader non-false claims."